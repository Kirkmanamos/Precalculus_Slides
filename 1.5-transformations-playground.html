<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.5 Transformations Playground</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&amp;display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <style>
        :root {
            --navy: #1a365d;
            --blue: #2563eb;
            --teal: #0891b2;
            --green: #16a34a;
            --orange: #d97706;
            --red: #dc2626;
            --ink: #1e293b;
            --muted: #64748b;
            --line: #dbeafe;
            --surface: #ffffff;
            --soft: #f8fafc;
            --soft-blue: #eff6ff;
            --soft-teal: #f0fdfa;
            --soft-green: #f0fdf4;
            --soft-orange: #fffbeb;
            --shadow: 0 18px 50px rgba(15, 23, 42, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            margin: 0;
            font-family: "Source Sans 3", sans-serif;
            color: var(--ink);
            background:
                linear-gradient(var(--line) 1px, transparent 1px),
                linear-gradient(90deg, var(--line) 1px, transparent 1px),
                #f8fbff;
            background-size: 30px 30px;
        }

        body {
            display: flex;
            justify-content: center;
            padding: 22px;
        }

        button,
        select,
        input {
            font: inherit;
        }

        button {
            border: 0;
        }

        .app {
            width: min(1440px, 100%);
            min-height: calc(100svh - 44px);
            display: grid;
            grid-template-columns: 310px minmax(560px, 1fr) 330px;
            gap: 18px;
            align-items: stretch;
        }

        .panel {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid #dbeafe;
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .controls {
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: auto;
        }

        .brand {
            padding: 18px 18px 14px;
            background: var(--navy);
            color: white;
            border-radius: 8px 8px 0 0;
        }

        .section-label {
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #93c5fd;
        }

        h1 {
            margin: 4px 0 0;
            font-size: 1.72rem;
            line-height: 1.08;
        }

        .control-scroll {
            padding: 16px;
            display: grid;
            gap: 16px;
        }

        .control-group {
            display: grid;
            gap: 10px;
        }

        .group-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--navy);
        }

        .parent-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .parent-option {
            min-height: 58px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: var(--surface);
            color: var(--ink);
            cursor: pointer;
            text-align: left;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        .parent-option:hover,
        .parent-option:focus-visible {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.16);
            outline: 0;
        }

        .parent-option.active {
            border-color: var(--navy);
            background: var(--soft-blue);
        }

        .parent-name {
            display: block;
            font-size: 0.86rem;
            font-weight: 800;
            color: var(--navy);
        }

        .parent-eq {
            display: block;
            margin-top: 2px;
            font-size: 0.82rem;
            color: var(--muted);
        }

        .slider-row {
            display: grid;
            gap: 7px;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: var(--soft);
        }

        .slider-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
        }

        .slider-head label {
            font-size: 0.9rem;
            font-weight: 700;
            color: #334155;
        }

        output {
            min-width: 3.8rem;
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-weight: 800;
            color: var(--teal);
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--teal);
        }

        .toggle-line {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: white;
            color: #334155;
            font-weight: 800;
            cursor: pointer;
        }

        .toggle[aria-pressed="true"] {
            color: white;
            border-color: var(--red);
            background: var(--red);
        }

        .toggle.utility-toggle[aria-pressed="true"] {
            border-color: var(--green);
            background: var(--green);
        }

        .preset-grid {
            display: grid;
            gap: 8px;
        }

        .preset-btn,
        .command-btn {
            min-height: 40px;
            padding: 8px 10px;
            border-radius: 8px;
            background: var(--navy);
            color: white;
            font-weight: 800;
            cursor: pointer;
        }

        .preset-btn {
            background: var(--soft-teal);
            color: #0f766e;
            border: 1px solid #99f6e4;
            text-align: left;
        }

        .preset-btn:hover,
        .preset-btn:focus-visible,
        .command-btn:hover,
        .command-btn:focus-visible,
        .toggle:hover,
        .toggle:focus-visible {
            outline: 0;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
        }

        .stage {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            overflow: hidden;
        }

        .equation-strip {
            display: grid;
            gap: 8px;
            padding: 14px 16px 10px;
            border-bottom: 1px solid #dbeafe;
        }

        .equation-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .equation-title h2 {
            margin: 0;
            font-size: 1.05rem;
            color: var(--navy);
        }

        .mode-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 800;
            color: var(--navy);
            background: #e8edf5;
        }

        .pill.orange {
            color: var(--orange);
            background: var(--soft-orange);
        }

        .equation-box {
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 12px;
            border-radius: 8px;
            background: var(--soft);
            border: 1px solid #e2e8f0;
            overflow-x: auto;
        }

        .graph-wrap {
            position: relative;
            min-height: 0;
            padding: 10px;
        }

        .graph-svg {
            width: 100%;
            height: 100%;
            min-height: 560px;
            display: block;
            border-radius: 8px;
            background: white;
            border: 1px solid #dbeafe;
        }

        .axis {
            stroke: #334155;
            stroke-width: 1.7;
        }

        .grid-line {
            stroke: #e2e8f0;
            stroke-width: 1;
        }

        .grid-major {
            stroke: #bfdbfe;
            stroke-width: 1.2;
        }

        .tick-label,
        .axis-label {
            fill: #475569;
            font-size: 12px;
            font-weight: 700;
        }

        .parent-path {
            fill: none;
            stroke: #94a3b8;
            stroke-width: 3;
            stroke-dasharray: 8 7;
        }

        .transform-path {
            fill: none;
            stroke: var(--blue);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .key-point {
            fill: white;
            stroke: var(--blue);
            stroke-width: 3;
        }

        .anchor-point {
            fill: var(--orange);
            stroke: white;
            stroke-width: 3;
        }

        .guide-line {
            stroke: var(--orange);
            stroke-width: 2;
            stroke-dasharray: 7 5;
            opacity: 0.82;
        }

        .inspector {
            display: flex;
            flex-direction: column;
            overflow: auto;
            min-height: 0;
            padding: 16px;
            gap: 16px;
        }

        .readout {
            display: grid;
            gap: 8px;
        }

        .readout-title {
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--navy);
        }

        .move-list {
            display: grid;
            gap: 8px;
        }

        .move {
            display: grid;
            grid-template-columns: 38px 1fr;
            gap: 10px;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: var(--soft);
        }

        .move-code {
            display: grid;
            place-items: center;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: var(--navy);
            color: white;
            font-size: 0.95rem;
            font-weight: 900;
        }

        .move-copy {
            font-size: 0.92rem;
            line-height: 1.25;
        }

        .move-copy strong {
            display: block;
            color: var(--navy);
        }

        .domain-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .domain-box {
            padding: 10px;
            border-radius: 8px;
            background: var(--soft-blue);
            border: 1px solid #bfdbfe;
            min-height: 76px;
        }

        .domain-box .label {
            color: var(--muted);
            font-size: 0.76rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .domain-box .value {
            margin-top: 4px;
            color: var(--navy);
            font-size: 1.02rem;
            font-weight: 800;
        }

        .point-table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .point-table th,
        .point-table td {
            padding: 8px 7px;
            border: 1px solid #e2e8f0;
            text-align: center;
            font-variant-numeric: tabular-nums;
        }

        .point-table th {
            background: var(--navy);
            color: white;
            font-weight: 800;
        }

        .point-table tbody tr:nth-child(odd) td {
            background: #f8fafc;
        }

        .point-table td:nth-child(2) {
            color: var(--teal);
            font-weight: 800;
        }

        .point-table td:nth-child(3) {
            color: var(--blue);
            font-weight: 800;
        }

        .status-line {
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid var(--green);
            background: var(--soft-green);
            color: #166534;
            font-size: 0.9rem;
            font-weight: 700;
            line-height: 1.35;
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 1180px) {
            body {
                padding: 12px;
            }

            .app {
                grid-template-columns: minmax(280px, 360px) minmax(520px, 1fr);
            }

            .inspector {
                grid-column: 1 / -1;
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                align-items: start;
            }
        }

        @media (max-width: 860px) {
            body {
                padding: 0;
            }

            .app {
                min-height: 100svh;
                grid-template-columns: 1fr;
                gap: 0;
            }

            .panel {
                border-radius: 0;
                box-shadow: none;
                border-left: 0;
                border-right: 0;
            }

            .controls {
                max-height: none;
            }

            .stage {
                min-height: 720px;
            }

            .inspector {
                grid-column: auto;
                grid-template-columns: 1fr;
            }

            .graph-svg {
                min-height: 430px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                transition: none !important;
                animation: none !important;
            }
        }
    </style>
</head>
<body>
    <main class="app" aria-label="Transformations Playground">
        <section class="panel controls" aria-label="Controls">
            <div class="brand">
                <div class="section-label">Section 1.5</div>
                <h1>Transformations Playground</h1>
            </div>
            <div class="control-scroll">
                <div class="control-group">
                    <div class="group-title">Parent Function</div>
                    <div class="parent-list" id="parentList"></div>
                </div>

                <div class="control-group">
                    <div class="group-title">Vertical Changes</div>
                    <div class="slider-row">
                        <div class="slider-head">
                            <label for="aMag">Vertical scale</label>
                            <output id="aMagOut">1.00</output>
                        </div>
                        <input id="aMag" type="range" min="0.25" max="3" step="0.25" value="1">
                    </div>
                    <div class="slider-row">
                        <div class="slider-head">
                            <label for="kShift">Vertical shift</label>
                            <output id="kShiftOut">0.00</output>
                        </div>
                        <input id="kShift" type="range" min="-5" max="5" step="0.25" value="0">
                    </div>
                    <div class="toggle-line">
                        <button class="toggle" id="reflectX" type="button" aria-pressed="false">Reflect x-axis</button>
                        <button class="toggle utility-toggle" id="showParent" type="button" aria-pressed="true">Parent curve</button>
                    </div>
                </div>

                <div class="control-group">
                    <div class="group-title">Horizontal Changes</div>
                    <div class="slider-row">
                        <div class="slider-head">
                            <label for="bMag">Horizontal factor</label>
                            <output id="bMagOut">1.00</output>
                        </div>
                        <input id="bMag" type="range" min="0.25" max="3" step="0.25" value="1">
                    </div>
                    <div class="slider-row">
                        <div class="slider-head">
                            <label for="hShift">Horizontal shift</label>
                            <output id="hShiftOut">0.00</output>
                        </div>
                        <input id="hShift" type="range" min="-5" max="5" step="0.25" value="0">
                    </div>
                    <div class="toggle-line">
                        <button class="toggle" id="reflectY" type="button" aria-pressed="false">Reflect y-axis</button>
                        <button class="toggle utility-toggle" id="showGuides" type="button" aria-pressed="true">Guides</button>
                    </div>
                </div>

                <div class="control-group">
                    <div class="group-title">Presets</div>
                    <div class="preset-grid">
                        <button class="preset-btn" type="button" data-preset="absolute">\(y=-2|x|+1\)</button>
                        <button class="preset-btn" type="button" data-preset="sqrt">\(y=\sqrt{-2(x+3)}-1\)</button>
                        <button class="preset-btn" type="button" data-preset="generic">\(g(x)=-\frac{1}{2}f(x-1)+3\)</button>
                    </div>
                    <button class="command-btn" id="resetBtn" type="button">Reset</button>
                </div>
            </div>
        </section>

        <section class="panel stage" aria-label="Graph workspace">
            <div class="equation-strip">
                <div class="equation-title">
                    <h2>Live Equation</h2>
                    <div class="mode-pills">
                        <span class="pill" id="parentPill">Parent: Linear</span>
                        <span class="pill orange" id="factorPill">Scale: 1</span>
                    </div>
                </div>
                <div class="equation-box" id="equationBox" aria-live="polite"></div>
            </div>
            <div class="graph-wrap">
                <svg class="graph-svg" id="graphSvg" viewBox="0 0 640 620" role="img" aria-labelledby="graphTitle graphDesc">
                    <title id="graphTitle">Parent and transformed function graph</title>
                    <desc id="graphDesc">The dashed curve is the parent function and the solid blue curve is the transformed function.</desc>
                </svg>
            </div>
        </section>

        <aside class="panel inspector" aria-label="Transformation details">
            <div class="readout">
                <div class="readout-title">Transformation Order</div>
                <div class="move-list" id="moveList"></div>
            </div>

            <div class="readout">
                <div class="readout-title">Domain and Range</div>
                <div class="domain-grid">
                    <div class="domain-box">
                        <div class="label">Domain</div>
                        <div class="value" id="domainBox"></div>
                    </div>
                    <div class="domain-box">
                        <div class="label">Range</div>
                        <div class="value" id="rangeBox"></div>
                    </div>
                </div>
                <div class="status-line" id="statusLine"></div>
            </div>

            <div class="readout">
                <div class="readout-title">Key Point Map</div>
                <table class="point-table">
                    <thead>
                        <tr>
                            <th>Parent</th>
                            <th>Rule</th>
                            <th>Image</th>
                        </tr>
                    </thead>
                    <tbody id="pointRows"></tbody>
                </table>
            </div>
        </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script>
        const parents = {
            linear: {
                name: "Linear",
                tex: "f(x)=x",
                expr: "x",
                fn: x => x,
                defined: () => true,
                keyPoints: [[-4, -4], [-2, -2], [0, 0], [2, 2], [4, 4]],
                domainType: "all",
                rangeType: "all"
            },
            quadratic: {
                name: "Quadratic",
                tex: "f(x)=x^2",
                expr: "x^2",
                fn: x => x * x,
                defined: () => true,
                keyPoints: [[-2, 4], [-1, 1], [0, 0], [1, 1], [2, 4]],
                domainType: "all",
                rangeType: "up"
            },
            cubic: {
                name: "Cubic",
                tex: "f(x)=x^3",
                expr: "x^3",
                fn: x => x * x * x,
                defined: () => true,
                keyPoints: [[-2, -8], [-1, -1], [0, 0], [1, 1], [2, 8]],
                domainType: "all",
                rangeType: "all"
            },
            absolute: {
                name: "Absolute",
                tex: "f(x)=|x|",
                expr: "\\left|x\\right|",
                fn: x => Math.abs(x),
                defined: () => true,
                keyPoints: [[-3, 3], [-1, 1], [0, 0], [1, 1], [3, 3]],
                domainType: "all",
                rangeType: "up"
            },
            sqrt: {
                name: "Square root",
                tex: "f(x)=\\sqrt{x}",
                expr: "\\sqrt{x}",
                fn: x => Math.sqrt(x),
                defined: x => x >= -1e-9,
                keyPoints: [[0, 0], [1, 1], [4, 2], [9, 3]],
                domainType: "sqrt",
                rangeType: "up"
            },
            cbrt: {
                name: "Cube root",
                tex: "f(x)=\\sqrt[3]{x}",
                expr: "\\sqrt[3]{x}",
                fn: x => Math.cbrt(x),
                defined: () => true,
                keyPoints: [[-8, -2], [-1, -1], [0, 0], [1, 1], [8, 2]],
                domainType: "all",
                rangeType: "all"
            }
        };

        const state = {
            parent: "linear",
            aMag: 1,
            bMag: 1,
            h: 0,
            k: 0,
            reflectX: false,
            reflectY: false,
            showParent: true,
            showGuides: true
        };

        const graph = {
            xmin: -10,
            xmax: 10,
            ymin: -10,
            ymax: 10,
            left: 60,
            top: 38,
            size: 520
        };

        const els = {
            parentList: document.getElementById("parentList"),
            aMag: document.getElementById("aMag"),
            bMag: document.getElementById("bMag"),
            hShift: document.getElementById("hShift"),
            kShift: document.getElementById("kShift"),
            aMagOut: document.getElementById("aMagOut"),
            bMagOut: document.getElementById("bMagOut"),
            hShiftOut: document.getElementById("hShiftOut"),
            kShiftOut: document.getElementById("kShiftOut"),
            reflectX: document.getElementById("reflectX"),
            reflectY: document.getElementById("reflectY"),
            showParent: document.getElementById("showParent"),
            showGuides: document.getElementById("showGuides"),
            resetBtn: document.getElementById("resetBtn"),
            equationBox: document.getElementById("equationBox"),
            graphSvg: document.getElementById("graphSvg"),
            parentPill: document.getElementById("parentPill"),
            factorPill: document.getElementById("factorPill"),
            moveList: document.getElementById("moveList"),
            domainBox: document.getElementById("domainBox"),
            rangeBox: document.getElementById("rangeBox"),
            pointRows: document.getElementById("pointRows"),
            statusLine: document.getElementById("statusLine")
        };

        const getA = () => (state.reflectX ? -1 : 1) * state.aMag;
        const getB = () => (state.reflectY ? -1 : 1) * state.bMag;

        function sx(x) {
            return graph.left + ((x - graph.xmin) / (graph.xmax - graph.xmin)) * graph.size;
        }

        function sy(y) {
            return graph.top + ((graph.ymax - y) / (graph.ymax - graph.ymin)) * graph.size;
        }

        function formatNumber(value) {
            const rounded = Math.round(value * 100) / 100;
            if (Math.abs(rounded) < 0.005) return "0";
            if (Number.isInteger(rounded)) return String(rounded);
            return rounded.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
        }

        function formatTexNumber(value) {
            return formatNumber(value);
        }

        function formatPoint(point) {
            return `(${formatNumber(point[0])}, ${formatNumber(point[1])})`;
        }

        function formatPointTex(point) {
            return `\\left(${formatTexNumber(point[0])}, ${formatTexNumber(point[1])}\\right)`;
        }

        function signedTex(value) {
            if (Math.abs(value) < 1e-9) return "";
            const sign = value > 0 ? "+" : "-";
            return `${sign} ${formatTexNumber(Math.abs(value))}`;
        }

        function insideTex(b, h) {
            const bAbs = Math.abs(b);
            const bPart = b === -1 ? "-" : b === 1 ? "" : `${formatTexNumber(b)}\\,`;
            if (Math.abs(h) < 1e-9) return `${bPart}x`;
            const shift = h > 0 ? `x - ${formatTexNumber(h)}` : `x + ${formatTexNumber(Math.abs(h))}`;
            if (bAbs === 1) return b < 0 ? `-\\left(${shift}\\right)` : shift;
            return `${formatTexNumber(b)}\\left(${shift}\\right)`;
        }

        function parentExpression(parent, inner) {
            if (parent === parents.linear) return inner;
            if (parent === parents.quadratic) return `\\left(${inner}\\right)^2`;
            if (parent === parents.cubic) return `\\left(${inner}\\right)^3`;
            if (parent === parents.absolute) return `\\left|${inner}\\right|`;
            if (parent === parents.sqrt) return `\\sqrt{${inner}}`;
            return `\\sqrt[3]{${inner}}`;
        }

        function transformedEquationTex() {
            const parent = parents[state.parent];
            const a = getA();
            const b = getB();
            const inner = insideTex(b, state.h);
            const base = parentExpression(parent, inner);
            let body;
            if (a === 1) {
                body = base;
            } else if (a === -1) {
                body = `-\\left(${base}\\right)`;
            } else {
                body = `${formatTexNumber(a)}\\left(${base}\\right)`;
            }
            body += signedTex(state.k);
            return `g(x) = ${body}`;
        }

        function transformedPoint(u, v) {
            const a = getA();
            const b = getB();
            return [state.h + u / b, a * v + state.k];
        }

        function transformedValue(x) {
            const parent = parents[state.parent];
            const u = getB() * (x - state.h);
            if (!parent.defined(u)) return null;
            const y = getA() * parent.fn(u) + state.k;
            return Number.isFinite(y) ? y : null;
        }

        function parentValue(x) {
            const parent = parents[state.parent];
            if (!parent.defined(x)) return null;
            const y = parent.fn(x);
            return Number.isFinite(y) ? y : null;
        }

        function pathFor(fn) {
            let d = "";
            let drawing = false;
            const samples = 720;
            for (let i = 0; i <= samples; i++) {
                const x = graph.xmin + (i / samples) * (graph.xmax - graph.xmin);
                const y = fn(x);
                if (y === null || Math.abs(y) > 40) {
                    drawing = false;
                    continue;
                }
                const px = sx(x);
                const py = sy(y);
                d += `${drawing ? "L" : "M"} ${px.toFixed(2)} ${py.toFixed(2)} `;
                drawing = true;
            }
            return d.trim();
        }

        function isInView(point) {
            const [x, y] = point;
            return x >= graph.xmin && x <= graph.xmax && y >= graph.ymin && y <= graph.ymax;
        }

        function gridMarkup() {
            let html = `<defs><clipPath id="plotClip"><rect x="${graph.left}" y="${graph.top}" width="${graph.size}" height="${graph.size}" rx="6"></rect></clipPath></defs>`;
            html += `<rect x="${graph.left}" y="${graph.top}" width="${graph.size}" height="${graph.size}" rx="6" fill="#ffffff"></rect>`;

            for (let i = graph.xmin; i <= graph.xmax; i++) {
                const cls = i % 5 === 0 ? "grid-major" : "grid-line";
                html += `<line class="${cls}" x1="${sx(i)}" y1="${graph.top}" x2="${sx(i)}" y2="${graph.top + graph.size}"></line>`;
            }
            for (let i = graph.ymin; i <= graph.ymax; i++) {
                const cls = i % 5 === 0 ? "grid-major" : "grid-line";
                html += `<line class="${cls}" x1="${graph.left}" y1="${sy(i)}" x2="${graph.left + graph.size}" y2="${sy(i)}"></line>`;
            }

            html += `<line class="axis" x1="${sx(graph.xmin)}" y1="${sy(0)}" x2="${sx(graph.xmax)}" y2="${sy(0)}"></line>`;
            html += `<line class="axis" x1="${sx(0)}" y1="${sy(graph.ymin)}" x2="${sx(0)}" y2="${sy(graph.ymax)}"></line>`;
            html += `<text class="axis-label" x="${sx(graph.xmax) - 13}" y="${sy(0) - 8}">x</text>`;
            html += `<text class="axis-label" x="${sx(0) + 9}" y="${sy(graph.ymax) + 18}">y</text>`;

            [-10, -5, 5, 10].forEach(t => {
                html += `<text class="tick-label" x="${sx(t)}" y="${sy(0) + 18}" text-anchor="middle">${t}</text>`;
                html += `<text class="tick-label" x="${sx(0) - 10}" y="${sy(t) + 4}" text-anchor="end">${t}</text>`;
            });
            return html;
        }

        function renderGraph() {
            const transformedPath = pathFor(transformedValue);
            const parentPath = pathFor(parentValue);
            let html = `
                <title id="graphTitle">Parent and transformed function graph</title>
                <desc id="graphDesc">The dashed curve is the parent function and the solid blue curve is the transformed function.</desc>
            `;
            html += gridMarkup();

            if (state.showGuides) {
                html += `<g clip-path="url(#plotClip)">`;
                html += `<line class="guide-line" x1="${sx(state.h)}" y1="${graph.top}" x2="${sx(state.h)}" y2="${graph.top + graph.size}"></line>`;
                html += `<line class="guide-line" x1="${graph.left}" y1="${sy(state.k)}" x2="${graph.left + graph.size}" y2="${sy(state.k)}"></line>`;
                html += `</g>`;
            }

            html += `<g clip-path="url(#plotClip)">`;
            if (state.showParent) {
                html += `<path class="parent-path" d="${parentPath}"></path>`;
            }
            html += `<path class="transform-path" d="${transformedPath}"></path>`;

            parents[state.parent].keyPoints.forEach(point => {
                const image = transformedPoint(point[0], point[1]);
                if (isInView(image)) {
                    html += `<circle class="key-point" cx="${sx(image[0])}" cy="${sy(image[1])}" r="5"></circle>`;
                }
            });

            if (isInView([state.h, state.k])) {
                html += `<circle class="anchor-point" cx="${sx(state.h)}" cy="${sy(state.k)}" r="6"></circle>`;
            }
            html += `</g>`;
            els.graphSvg.innerHTML = html;
        }

        function rangeTex() {
            const parent = parents[state.parent];
            const a = getA();
            const k = state.k;
            if (parent.rangeType === "all") return "\\mathbb{R}";
            if (a > 0) return `y \\ge ${formatTexNumber(k)}`;
            return `y \\le ${formatTexNumber(k)}`;
        }

        function domainTex() {
            const parent = parents[state.parent];
            const b = getB();
            const h = state.h;
            if (parent.domainType === "all") return "\\mathbb{R}";
            if (b > 0) return `x \\ge ${formatTexNumber(h)}`;
            return `x \\le ${formatTexNumber(h)}`;
        }

        function renderTex(el, tex, displayMode = false) {
            if (window.katex) {
                katex.render(tex, el, { displayMode, throwOnError: false });
            } else {
                el.textContent = tex;
            }
        }

        function renderInlineMath(el) {
            if (window.renderMathInElement) {
                renderMathInElement(el, {
                    delimiters: [
                        { left: "\\[", right: "\\]", display: true },
                        { left: "\\(", right: "\\)", display: false }
                    ],
                    throwOnError: false
                });
            }
        }

        function renderReadouts() {
            const parent = parents[state.parent];
            const a = getA();
            const b = getB();

            els.parentPill.textContent = `Parent: ${parent.name}`;
            els.factorPill.textContent = `Scale: a=${formatNumber(a)}, b=${formatNumber(b)}`;
            renderTex(els.equationBox, transformedEquationTex(), true);
            renderTex(els.domainBox, domainTex());
            renderTex(els.rangeBox, rangeTex());

            const horizontalScale = 1 / Math.abs(b);
            const moves = [
                {
                    code: "D",
                    title: "Dilation",
                    copy: `Vertical scale ${formatNumber(Math.abs(a))}; horizontal scale ${formatNumber(horizontalScale)}.`
                },
                {
                    code: "R",
                    title: "Reflection",
                    copy: `${a < 0 ? "Across the x-axis" : "No x-axis reflection"}; ${b < 0 ? "across the y-axis" : "no y-axis reflection"}.`
                },
                {
                    code: "S",
                    title: "Shift",
                    copy: `${state.h === 0 ? "No horizontal shift" : state.h > 0 ? `Right ${formatNumber(state.h)}` : `Left ${formatNumber(Math.abs(state.h))}`}; ${state.k === 0 ? "no vertical shift" : state.k > 0 ? `up ${formatNumber(state.k)}` : `down ${formatNumber(Math.abs(state.k))}`}.`
                }
            ];
            els.moveList.innerHTML = moves.map(move => `
                <div class="move">
                    <div class="move-code">${move.code}</div>
                    <div class="move-copy"><strong>${move.title}</strong>${move.copy}</div>
                </div>
            `).join("");

            els.statusLine.innerHTML = `A parent point \\((u, v)\\) maps to \\((h + u / b, av + k)\\). Current map: \\((u, v) \\mapsto \\left(${formatTexNumber(state.h)} + \\dfrac{u}{${formatTexNumber(b)}}, ${formatTexNumber(a)}v ${state.k < 0 ? "-" : "+"} ${formatTexNumber(Math.abs(state.k))}\\right)\\).`;
            renderInlineMath(els.statusLine);
        }

        function renderTable() {
            const parent = parents[state.parent];
            els.pointRows.innerHTML = parent.keyPoints.map(point => {
                const image = transformedPoint(point[0], point[1]);
                const rule = `\\left(${formatTexNumber(state.h)} + \\dfrac{${formatTexNumber(point[0])}}{${formatTexNumber(getB())}}, ${formatTexNumber(getA())}\\left(${formatTexNumber(point[1])}\\right) ${state.k < 0 ? "-" : "+"} ${formatTexNumber(Math.abs(state.k))}\\right)`;
                return `
                    <tr>
                        <td>\\(${formatPointTex(point)}\\)</td>
                        <td>\\(${rule}\\)</td>
                        <td>\\(${formatPointTex(image)}\\)</td>
                    </tr>
                `;
            }).join("");
            renderInlineMath(els.pointRows);
        }

        function syncControls() {
            els.aMag.value = state.aMag;
            els.bMag.value = state.bMag;
            els.hShift.value = state.h;
            els.kShift.value = state.k;
            els.aMagOut.textContent = formatNumber(state.aMag);
            els.bMagOut.textContent = formatNumber(state.bMag);
            els.hShiftOut.textContent = formatNumber(state.h);
            els.kShiftOut.textContent = formatNumber(state.k);
            els.reflectX.setAttribute("aria-pressed", String(state.reflectX));
            els.reflectY.setAttribute("aria-pressed", String(state.reflectY));
            els.showParent.setAttribute("aria-pressed", String(state.showParent));
            els.showGuides.setAttribute("aria-pressed", String(state.showGuides));
            Array.from(els.parentList.querySelectorAll(".parent-option")).forEach(button => {
                button.classList.toggle("active", button.dataset.parent === state.parent);
                button.setAttribute("aria-pressed", String(button.dataset.parent === state.parent));
            });
        }

        function update() {
            syncControls();
            renderGraph();
            renderReadouts();
            renderTable();
        }

        function setPreset(name) {
            if (name === "absolute") {
                Object.assign(state, {
                    parent: "absolute",
                    aMag: 2,
                    bMag: 1,
                    h: 0,
                    k: 1,
                    reflectX: true,
                    reflectY: false,
                    showParent: true,
                    showGuides: true
                });
            } else if (name === "sqrt") {
                Object.assign(state, {
                    parent: "sqrt",
                    aMag: 1,
                    bMag: 2,
                    h: -3,
                    k: -1,
                    reflectX: false,
                    reflectY: true,
                    showParent: true,
                    showGuides: true
                });
            } else {
                Object.assign(state, {
                    parent: "quadratic",
                    aMag: 0.5,
                    bMag: 1,
                    h: 1,
                    k: 3,
                    reflectX: true,
                    reflectY: false,
                    showParent: true,
                    showGuides: true
                });
            }
            update();
        }

        function reset() {
            Object.assign(state, {
                parent: "linear",
                aMag: 1,
                bMag: 1,
                h: 0,
                k: 0,
                reflectX: false,
                reflectY: false,
                showParent: true,
                showGuides: true
            });
            update();
        }

        function buildParentButtons() {
            els.parentList.innerHTML = Object.entries(parents).map(([key, parent]) => `
                <button class="parent-option" type="button" data-parent="${key}" aria-pressed="false">
                    <span class="parent-name">${parent.name}</span>
                    <span class="parent-eq">\\(${parent.tex}\\)</span>
                </button>
            `).join("");
            els.parentList.querySelectorAll(".parent-option").forEach(button => {
                button.addEventListener("click", () => {
                    state.parent = button.dataset.parent;
                    update();
                });
            });
        }

        function bindControls() {
            els.aMag.addEventListener("input", () => {
                state.aMag = Number(els.aMag.value);
                update();
            });
            els.bMag.addEventListener("input", () => {
                state.bMag = Number(els.bMag.value);
                update();
            });
            els.hShift.addEventListener("input", () => {
                state.h = Number(els.hShift.value);
                update();
            });
            els.kShift.addEventListener("input", () => {
                state.k = Number(els.kShift.value);
                update();
            });
            els.reflectX.addEventListener("click", () => {
                state.reflectX = !state.reflectX;
                update();
            });
            els.reflectY.addEventListener("click", () => {
                state.reflectY = !state.reflectY;
                update();
            });
            els.showParent.addEventListener("click", () => {
                state.showParent = !state.showParent;
                update();
            });
            els.showGuides.addEventListener("click", () => {
                state.showGuides = !state.showGuides;
                update();
            });
            els.resetBtn.addEventListener("click", reset);
            document.querySelectorAll("[data-preset]").forEach(button => {
                button.addEventListener("click", () => setPreset(button.dataset.preset));
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            buildParentButtons();
            bindControls();
            renderInlineMath(document.body);
            update();
        });
    </script>
</body>
</html>
